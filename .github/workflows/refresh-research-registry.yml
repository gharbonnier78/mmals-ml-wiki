name: Refresh research registry
on:
  schedule:
    - cron: "43 6 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh public GitHub metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/refresh_github_registry.py
      - name: Validate internal links
        run: python scripts/check_internal_links.py
      - name: Validate release metadata
        run: python scripts/check_release_consistency.py
      - name: Commit refreshed registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-live.json
          git diff --cached --quiet || git commit -m "chore: refresh GitHub research registry"
          git push
