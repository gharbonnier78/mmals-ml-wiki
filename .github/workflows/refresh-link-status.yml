name: Refresh external link status
on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/check_external_links.py --output data/link-health.json
      - name: Commit refreshed status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/link-health.json
          git diff --cached --quiet || git commit -m "chore: refresh external link health"
          git push
